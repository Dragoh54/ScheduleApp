syntax = "proto3";

option csharp_namespace = "UserService.Grpc";

package user;

service UserService {
  rpc GetUserInfo (GetUserInfoRequest) returns (GetUserInfoReply);
}

message GetUserInfoRequest {
  string userId = 1;
}

message GetUserInfoReply {
  string username = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
}